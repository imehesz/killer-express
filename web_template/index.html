<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Killer Xpress</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; touch-action: manipulation; }
        #click-to-start {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-family: monospace;
            font-size: 1.2rem;
            padding: 1rem 2.5rem;
            border-radius: 0.5rem;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        #click-to-start:hover, #click-to-start:active {
            background: rgba(40, 120, 40, 0.85);
            border-color: rgba(100, 255, 100, 0.5);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: monospace;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <div id="click-to-start">TAP TO PLAY</div>

    GODOT_CONFIG

    <script>
    // Wait for engine to be ready, then start on user gesture
    function checkEngine() {
        if (typeof Engine !== 'undefined') {
            startWithOverlay();
        } else {
            setTimeout(checkEngine, 100);
        }
    }

    function startWithOverlay() {
        var loadingEl = document.getElementById('loading');
        var clickOverlay = document.getElementById('click-to-start');

        function startEngine() {
            if (clickOverlay) clickOverlay.remove();
            if (loadingEl) loadingEl.remove();

            var canvas = document.querySelector('canvas');
            if (canvas) {
                canvas.style.width = '100%';
                canvas.style.height = '100%';
            }

            var engine = new Engine();
            engine.startGame({ canvas: canvas }).then(function() {
                console.log('Game started');
            }).catch(function(err) {
                console.error('Failed to start game:', err);
            });
        }

        if (clickOverlay) {
            clickOverlay.addEventListener('click', startEngine, { once: true });
            clickOverlay.addEventListener('touchstart', startEngine, { once: true });
        } else {
            startEngine();
        }
    }

    // Persistent audio context resume — THE actual audio fix for mobile
    document.addEventListener('click', function() {
        if (typeof GodotAudio !== 'undefined' && GodotAudio.ctx && GodotAudio.ctx.state === 'suspended') {
            GodotAudio.ctx.resume();
        }
    });
    document.addEventListener('touchstart', function() {
        if (typeof GodotAudio !== 'undefined' && GodotAudio.ctx && GodotAudio.ctx.state === 'suspended') {
            GodotAudio.ctx.resume();
        }
    });

    // Prevent pull-to-refresh and bounce scrolling on mobile
    document.addEventListener('touchmove', function(e) {
        if (e.target.tagName === 'CANVAS') e.preventDefault();
    }, { passive: false });

    // Start checking once DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', checkEngine);
    } else {
        checkEngine();
    }
    </script>

    GODOT_THREADS_ENABLED
</body>
</html>
